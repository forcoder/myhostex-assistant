<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyHostex 智能回复助手</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 13px;
      color: #1e1b4b;
      background: #f5f3ff;
    }

    /* ── Header ── */
    .popup-header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      padding: 14px 16px 12px;
    }
    .popup-header h1 {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .popup-header .subtitle {
      font-size: 11px;
      opacity: 0.8;
      margin-top: 3px;
    }

    /* ── Tab Bar ── */
    .tab-bar {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #ede9fe;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.15s;
    }
    .tab-btn.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }
    .tab-btn:hover:not(.active) { background: #f9f7ff; }

    /* ── Tab Content ── */
    .tab-panel { display: none; padding: 10px; }
    .tab-panel.active { display: block; }

    /* ── Section ── */
    .section {
      background: #fff;
      border-radius: 10px;
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .section-title {
      font-size: 11px;
      color: #7c3aed;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 10px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .label-hint {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 400;
      margin-left: 4px;
    }
    input[type="text"],
    input[type="password"],
    input[type="url"],
    textarea,
    select {
      width: 100%;
      padding: 7px 9px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.15);
    }
    textarea { resize: vertical; min-height: 60px; }

    /* ── Buttons ── */
    .btn {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-secondary { background: #e0e7ff; color: #3730a3; }
    .btn-secondary:hover { background: #c7d2fe; }
    .btn-test { background: #10b981; color: #fff; padding: 7px 10px; font-size: 11px; }
    .btn-test:hover { background: #059669; }
    .btn-icon-sm {
      background: transparent; color: #6b7280; border: none;
      padding: 3px; cursor: pointer; font-size: 13px;
    }
    .btn-icon-sm:hover { color: #4f46e5; }
    .btn-row { display: flex; gap: 8px; }
    .btn-full { width: 100%; }

    /* ── Input Row ── */
    .input-row { display: flex; gap: 6px; }
    .input-row input { flex: 1; }

    /* ── API Status ── */
    .api-status {
      display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 11px; color: #6b7280;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #d1d5db; transition: background 0.3s;
    }
    .status-dot.ok { background: #10b981; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.err { background: #ef4444; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── AI Config Card ── */
    .ai-config-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .ai-config-card.default {
      border-color: #4f46e5;
      background: #eef2ff;
    }
    .ai-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .ai-card-name {
      font-size: 12px;
      font-weight: 700;
      color: #1e1b4b;
    }
    .ai-card-default-badge {
      font-size: 10px;
      background: #4f46e5;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }
    .ai-card-actions {
      display: flex;
      gap: 4px;
    }
    .ai-card-info {
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
    }
    .ai-card-model {
      color: #4b5563;
    }

    /* ── Modal ── */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-content {
      background: #fff; width: 90%; max-width: 480px;
      border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .modal-header {
      background: #f5f3ff; padding: 12px 16px;
      display: flex; justify-content: space-between; align-items: center;
      font-weight: 700; font-size: 13px; color: #4f46e5;
    }
    .modal-close {
      background: transparent; border: none; font-size: 18px; cursor: pointer; color: #9ca3af;
    }
    .modal-close:hover { color: #6b7280; }
    .modal-body { padding: 16px; max-height: 70vh; overflow-y: auto; }
    .modal-footer {
      padding: 12px 16px; background: #f9fafb;
      border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px;
    }

    /* ── Status Message ── */
    #status-msg {
      font-size: 12px; text-align: center; margin-top: 8px;
    }

    /* ── Empty Tip ── */
    .empty-tip {
      font-size: 12px; color: #9ca3af; text-align: center; padding: 20px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <h1>🤖 MyHostex 智能助手</h1>
    <div class="subtitle">智能生成回复建议 · v3.4.0 多模型自动降级</div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="tab-ai">🔌 AI 配置</button>
    <button class="tab-btn" data-tab="tab-rooms">🏠 房间信息</button>
    <button class="tab-btn" data-tab="tab-kb">📚 知识库</button>
    <button class="tab-btn" data-tab="tab-rules">⚙️ 回复规则</button>
    <button class="tab-btn" data-tab="tab-style">📊 风格学习</button>
  </div>

  <!-- ══════════ TAB: AI 配置 ══════════ -->
  <div class="tab-panel active" id="tab-ai">

    <!-- 多模型列表 -->
    <div class="section">
      <div class="section-title">🔌 大模型配置（支持多个，优先使用默认）</div>
      <div id="ai-configs-list"></div>
      <button class="btn btn-secondary btn-full" id="btn-add-ai-config" style="margin-top:10px">
        ➕ 添加模型配置
      </button>
    </div>

    <!-- 生成参数 -->
    <div class="section">
      <div class="section-title">⚙️ 生成参数</div>
      <div class="form-group">
        <label>最多建议条数</label>
        <select id="ai-max-suggestions">
          <option value="3">3 条</option>
          <option value="4">4 条</option>
          <option value="5" selected>5 条</option>
        </select>
      </div>
      <div class="form-group">
        <label>回复语言偏好</label>
        <select id="ai-lang">
          <option value="auto">自动（跟随客人语言）</option>
          <option value="zh">中文</option>
          <option value="en">英文</option>
          <option value="bilingual">中英双语</option>
        </select>
      </div>
    </div>

    <div id="status-msg"></div>
  </div>

  <!-- 模型配置编辑/添加 Modal -->
  <div class="modal" id="ai-config-modal" style="display:none">
    <div class="modal-content" style="max-width:480px">
      <div class="modal-header">
        <span id="ai-modal-title">添加模型配置</span>
        <button class="modal-close" data-close="ai-config-modal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>配置名称 <span class="label-hint">（用于识别，如：GPT-4 主模型）</span></label>
          <input type="text" id="ai-config-name" placeholder="GPT-4" maxlength="30" />
        </div>

        <div class="form-group">
          <label>模型提供商</label>
          <select id="ai-provider">
            <option value="openai">OpenAI (GPT-4o / GPT-4)</option>
            <option value="deepseek">DeepSeek</option>
            <option value="qwen">通义千问 (Qwen)</option>
            <option value="zhipu">智谱 GLM</option>
            <option value="custom">自定义 API（兼容 OpenAI 格式）</option>
          </select>
        </div>

        <div class="form-group" id="group-base-url" style="display:none">
          <label>API Base URL</label>
          <input type="url" id="ai-base-url" placeholder="https://api.example.com/v1" />
        </div>

        <div class="form-group">
          <label>API Key</label>
          <div class="input-row">
            <input type="password" id="ai-api-key" placeholder="sk-..." autocomplete="off" />
            <button class="btn-test" id="btn-test-api-in-modal">测试连接</button>
          </div>
          <div class="api-status">
            <div class="status-dot" id="api-dot-modal"></div>
            <span id="api-status-text-modal">未配置</span>
          </div>
        </div>

        <div class="form-group">
          <label>模型名称 <span class="label-hint">（留空使用默认）</span></label>
          <input type="text" id="ai-model" placeholder="gpt-4o" />
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="ai-config-default" /> 设为默认模型
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-close="ai-config-modal">取消</button>
        <button class="btn btn-primary" id="btn-save-ai-config">保存</button>
      </div>
    </div>
  </div>

  <!-- ══════════ 其他 TAB 保持不变（截断）══════════ -->
  <!-- TODO: 其他 Tab 的内容保持原样，稍后复制完整内容 -->

  <script src="popup.js"></script>
</body>
</html>

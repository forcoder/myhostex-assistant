<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>动态链接提取工具</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
    h2 { color: #333; margin-top: 0; }
    button { padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #results { margin-top: 15px; }
    .url-item { padding: 8px; border-bottom: 1px solid #eee; font-family: monospace; font-size: 13px; }
    .url-item:hover { background: #f5f5f5; }
    .count { font-weight: bold; color: #2563eb; font-size: 18px; }
    .copy-btn { padding: 4px 8px; font-size: 12px; background: #059669; margin-left: 10px; }
    textarea { width: 100%; height: 80px; padding: 8px; font-family: monospace; font-size: 13px; }
    .warning { background: #fff3cd; padding: 10px; border-left: 4px solid #ffc107; margin-bottom: 15px; }
    .info { background: #d1ecf1; padding: 10px; border-left: 4px solid #17a2b8; margin-bottom: 15px; }
  </style>
</head>
<body>
  <h1>🔗 房源链接提取工具（动态加载）</h1>

  <div class="warning">
    <strong>⚠️ 使用说明</strong>：
    <ol>
      <li>打开目标民宿列表页，等待页面完全加载</li>
      <li>滚动页面到底部，确保所有房源都已加载</li>
      <li>复制当前页面的 URL</li>
      <li>粘贴到下方输入框中</li>
      <li>点击"提取链接"按钮</li>
      <li>会自动在新标签页中打开该页面并提取链接</li>
    </ol>
  </div>

  <div class="info">
    <strong>💡 提示</strong>：如果页面需要登录，请先在浏览器中登录。
  </div>

  <div class="section">
    <h2>📋 输入页面 URL</h2>
    <textarea id="urlInput" placeholder="粘贴页面 URL，例如：https://minsu.dianping.com/host/house/list/online"></textarea>
    <div style="margin-top: 10px;">
      <button id="extractBtn" onclick="extractLinks()">🔗 提取链接</button>
      <button onclick="pasteFromClipboard()" style="background: #6b7280; margin-left: 10px;">📋 从剪贴板粘贴</button>
    </div>
  </div>

  <div class="section">
    <h2>📊 提取结果</h2>
    <div id="results">
      <p style="color: #666;">点击"提取链接"按钮开始...</p>
    </div>
  </div>

  <script>
    async function extractLinks() {
      const urlInput = document.getElementById('urlInput');
      const resultsDiv = document.getElementById('results');
      const btn = document.getElementById('extractBtn');

      const url = urlInput.value.trim();
      if (!url) {
        alert('请输入页面 URL');
        return;
      }

      if (!url.startsWith('http')) {
        alert('请输入有效的 HTTP/HTTPS URL');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ 正在提取...';

      resultsDiv.innerHTML = '<p>正在打开页面并提取链接，请稍候...</p>';

      try {
        // 创建一个隐藏的 iframe 来加载页面
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.style.width = '0';
        iframe.style.height = '0';
        document.body.appendChild(iframe);

        // 监听 iframe 加载完成
        iframe.onload = () => {
          try {
            // 等待一下，确保动态内容加载
            setTimeout(() => {
              try {
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                const links = extractUrlsFromDocument(iframeDoc, url);

                displayResults(links, url);

                // 清理 iframe
                document.body.removeChild(iframe);
                btn.disabled = false;
                btn.textContent = '🔗 提取链接';
              } catch (e) {
                handleCORS(e);
                document.body.removeChild(iframe);
                btn.disabled = false;
                btn.textContent = '🔗 提取链接';
              }
            }, 2000);
          } catch (e) {
            handleCORS(e);
            document.body.removeChild(iframe);
            btn.disabled = false;
            btn.textContent = '🔗 提取链接';
          }
        };

        iframe.onerror = () => {
          handleError('页面加载失败，请检查 URL 是否正确');
          document.body.removeChild(iframe);
          btn.disabled = false;
          btn.textContent = '🔗 提取链接';
        };

        // 加载页面
        iframe.src = url;
      } catch (e) {
        handleError('提取失败：' + e.message);
        btn.disabled = false;
        btn.textContent = '🔗 提取链接';
      }
    }

    function extractUrlsFromDocument(doc, baseUrl) {
      const urls = new Set();
      const origin = new URL(baseUrl).origin;

      // 扫描所有 <a> 标签
      doc.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        const fullUrl = href.startsWith('http') ? href : (href.startsWith('/') ? origin + href : baseUrl + href);

        // 匹配房源详情链接
        const isDetailUrl = /\/(?:listings|room|rooms|property|home|house|stay|accommodation|listing|villa|apartment|detail)\/[\w\-]+/.test(fullUrl);
        const isListUrl = /\/(?:listings|rooms|properties|houses|homes|stays|accommodations)(\/|\?|$)/.test(fullUrl);
        const isFilterUrl = /[\?\&](?:filter|sort|page|size)/.test(fullUrl);
        const isApiUrl = /\/api\//.test(fullUrl);

        if (isDetailUrl && !isListUrl && !isFilterUrl && !isApiUrl) {
          urls.add(fullUrl);
        }
      });

      // 从 data-* 属性提取
      doc.querySelectorAll('[data-room-id], [data-house-id], [data-id]').forEach(el => {
        const roomId = el.getAttribute('data-room-id') || el.getAttribute('data-house-id');
        const dataId = el.getAttribute('data-id');
        const id = roomId || dataId;
        if (id && id.length >= 4) {
          // 尝试多种可能的详情页路径
          ['/room/', '/rooms/', '/house/', '/detail/'].forEach(prefix => {
            urls.add(origin + prefix + id);
          });
        }
      });

      // 从页面文本中提取路径
      const pageText = doc.body.innerText || '';
      const patterns = [
        /\/listings\/[\w\-]+/g,
        /\/room\/[\w\-]+/g,
        /\/rooms\/[\w\-]+/g,
        /\/property\/[\w\-]+/g,
        /\/home\/[\w\-]+/g,
        /\/house\/[\w\-]+/g,
        /\/stay\/[\w\-]+/g,
        /\/accommodation\/[\w\-]+/g,
        /\/detail\/[\w\-]+/g,
      ];

      patterns.forEach(p => {
        const matches = pageText.match(p) || [];
        matches.forEach(m => urls.add(m.startsWith('/') ? origin + m : m));
      });

      return Array.from(urls);
    }

    function displayResults(urls, baseUrl) {
      const resultsDiv = document.getElementById('results');

      let html = `
        <p><span class="count">${urls.length}</span> 个房源链接</p>
        <div style="margin-bottom: 15px;">
          <button class="copy-btn" onclick="copyAllLinks()">复制全部链接</button>
        </div>
        <div style="max-height: 500px; overflow-y: auto; border: 1px solid #ddd; padding: 10px;">
      `;

      if (urls.length === 0) {
        html += `
          <div style="color: red; padding: 20px;">
            <p><strong>❌ 未找到任何房源链接</strong></p>
            <p>可能的原因：</p>
            <ul>
              <li>页面需要登录才能查看</li>
              <li>页面还在加载中，请等待几秒后再试</li>
              <li>页面结构与预期的不同</li>
            </ul>
          </div>
        `;
      } else {
        urls.forEach((url, i) => {
          html += `
            <div class="url-item">
              <span style="color: #666; margin-right: 10px;">${i + 1}.</span>
              <a href="${url}" target="_blank" style="color: #2563eb;">${url}</a>
              <button class="copy-btn" onclick="copyLink('${url}')">复制</button>
            </div>
          `;
        });
      }

      html += '</div>';
      resultsDiv.innerHTML = html;
    }

    function handleCORS(e) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `
        <div style="color: #dc2626; padding: 20px;">
          <p><strong>❌ 跨域访问受限</strong></p>
          <p>由于浏览器安全限制，无法直接访问外部页面。</p>
          <p><strong>替代方案：</strong></p>
          <ol>
            <li>在浏览器中打开目标页面</li>
            <li>按 <strong>F12</strong> 打开开发者工具</li>
            <li>切换到 <strong>Console（控制台）</strong> 标签</li>
            <li>复制下面的代码并粘贴到控制台中，按回车执行：</li>
          </ol>
          <textarea readonly onclick="this.select()">${getConsoleScript()}</textarea>
        </div>
      `;
    }

    function handleError(message) {
      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = `<div style="color: red;">❌ ${message}</div>`;
    }

    function getConsoleScript() {
      return `(function() {
  const urls = new Set();
  const origin = window.location.origin;

  // 扫描所有链接
  document.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href) return;
    const fullUrl = href.startsWith('http') ? href : (href.startsWith('/') ? origin + href : href);

    const isDetailUrl = /\\/(?:listings|room|rooms|property|home|house|stay|accommodation|listing|villa|apartment|detail)\\/[\\w\\-]+/.test(fullUrl);
    const isListUrl = /\\/(?:listings|rooms|properties|houses|homes|stays|accommodations)(\\/|\\?|$)/.test(fullUrl);
    const isFilterUrl = /[\\?\\&](?:filter|sort|page|size)/.test(fullUrl);
    const isApiUrl = /\\/api\\//.test(fullUrl);

    if (isDetailUrl && !isListUrl && !isFilterUrl && !isApiUrl) {
      urls.add(fullUrl);
    }
  });

  // 从 data-* 属性提取
  document.querySelectorAll('[data-room-id], [data-house-id], [data-id]').forEach(el => {
    const roomId = el.getAttribute('data-room-id') || el.getAttribute('data-house-id');
    const dataId = el.getAttribute('data-id');
    const id = roomId || dataId;
    if (id && id.length >= 4) {
      ['/room/', '/rooms/', '/house/', '/detail/'].forEach(prefix => {
        urls.add(origin + prefix + id);
      });
    }
  });

  // 输出结果
  const urlList = Array.from(urls);
  console.log('找到 ' + urlList.length + ' 个房源链接：');
  console.log(urlList.join('\\n'));

  // 复制到剪贴板
  navigator.clipboard.writeText(urlList.join('\\n')).then(() => {
    alert('已复制 ' + urlList.length + ' 个链接到剪贴板！');
  });

  return urlList;
})();`;
    }

    function copyAllLinks() {
      const urls = Array.from(document.querySelectorAll('.url-item a')).map(a => a.href);
      navigator.clipboard.writeText(urls.join('\\n')).then(() => {
        alert('已复制 ' + urls.length + ' 个链接到剪贴板！');
      });
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        alert('已复制链接！');
      });
    }

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById('urlInput').value = text;
      } catch (e) {
        alert('无法读取剪贴板，请手动粘贴');
      }
    }
  </script>
</body>
</html>
